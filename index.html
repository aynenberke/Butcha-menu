<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Butcha Steakhouse icecek menusu - premium alkol seckileri.">
  <title>Butcha Steakhouse | İçecek Menüsü</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:ital,wght@0,500;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #5C1F2E;
      --secondary: #722F3F;
      --accent: #8B3A4F;
      --bg: #FAF7F2;
      --card: #FFFFFF;
      --text: #2A1218;
      --muted: #6F5A60;
      --gold: #C9A96E;
      --radius: 16px;
      --shadow: 0 8px 30px rgba(42, 18, 24, 0.08);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: "DM Sans", "Inter", system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.45;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      width: min(1160px, 92vw);
      margin-inline: auto;
    }

    header.hero {
      background: linear-gradient(145deg, #45121f 0%, var(--primary) 42%, var(--secondary) 100%);
      color: #fff;
      padding: 4rem 1rem 3rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .hero::before,
    .hero::after {
      content: "";
      position: absolute;
      inset: auto auto -80px -80px;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(201, 169, 110, 0.17), transparent 70%);
      pointer-events: none;
    }

    .hero::after {
      inset: -80px -80px auto auto;
    }

    .hero-logo {
      width: clamp(94px, 10vw, 126px);
      height: clamp(94px, 10vw, 126px);
      border-radius: 999px;
      margin: 0 auto 1rem;
      display: block;
      object-fit: cover;
      object-position: center;
      border: 1px solid rgba(201, 169, 110, 0.45);
      background: rgba(255, 255, 255, 0.05);
      box-shadow: 0 8px 18px rgba(42, 18, 24, 0.2);
      padding: 2px;
    }

    .hero h1 {
      margin: 0;
      font-family: "Playfair Display", serif;
      font-size: clamp(2rem, 5vw, 3.3rem);
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .hero p {
      margin: 0.6rem auto 0;
      font-family: "Playfair Display", serif;
      font-style: italic;
      color: #f7e8ea;
      max-width: 50ch;
      font-size: clamp(1rem, 2.5vw, 1.2rem);
    }

    .sticky-nav {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(250, 247, 242, 0.98);
      border-bottom: 1px solid rgba(201, 169, 110, 0.32);
    }

    .sticky-nav ul {
      margin: 0;
      padding: 0.75rem 0;
      list-style: none;
      display: flex;
      gap: 0.45rem;
      overflow-x: auto;
      scrollbar-width: thin;
    }

    .nav-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      padding-top: 0.65rem;
    }

    .lang-switch {
      display: inline-flex;
      border: 1px solid rgba(92, 31, 46, 0.18);
      border-radius: 999px;
      overflow: hidden;
      background: #fff;
      flex-shrink: 0;
    }

    .lang-btn {
      border: 0;
      background: transparent;
      color: var(--text);
      padding: 0.42rem 0.72rem;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.8rem;
      letter-spacing: 0.03em;
    }

    .lang-btn.active {
      background: var(--primary);
      color: #fff;
    }

    .sticky-nav a {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      text-decoration: none;
      color: var(--text);
      background: #fff;
      border: 1px solid rgba(92, 31, 46, 0.14);
      padding: 0.5rem 0.85rem;
      border-radius: 999px;
      white-space: nowrap;
      font-size: 0.9rem;
      transition: color 180ms ease, border-color 180ms ease, transform 180ms ease;
    }

    .sticky-nav a:hover,
    .sticky-nav a:focus-visible {
      border-color: rgba(92, 31, 46, 0.3);
      color: var(--primary);
      transform: translateY(-1px);
    }

    .i {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }
    .i svg { width: 100%; height: 100%; display: block; }

    main {
      padding: 1.2rem 0 2.2rem;
    }

    section.menu-section {
      margin-top: 1.7rem;
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: clamp(1rem, 2vw, 1.5rem);
      content-visibility: auto;
      contain-intrinsic-size: 1px 600px;
    }

    .section-title-wrap {
      text-align: center;
      margin-bottom: 1rem;
    }

    .gold-line {
      height: 1px;
      width: min(250px, 80%);
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 0.4rem auto;
    }

    .section-title {
      margin: 0;
      font-family: "Playfair Display", serif;
      font-size: clamp(1.3rem, 2.8vw, 1.8rem);
      letter-spacing: 0.02em;
      display: inline-flex;
      gap: 0.45rem;
      align-items: center;
      justify-content: center;
    }

    .items-grid {
      display: grid;
      gap: 0.7rem 1rem;
      grid-template-columns: 1fr;
    }

    @media (min-width: 820px) {
      .items-grid { grid-template-columns: 1fr 1fr; }
    }

    .menu-item {
      padding: 0.8rem 0.85rem;
      border-radius: 10px;
      background: #fff;
      border: 1px solid rgba(92, 31, 46, 0.08);
      transition: transform 160ms ease, box-shadow 180ms ease;
    }

    .menu-item:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 22px rgba(42, 18, 24, 0.11);
    }

    @media (hover: none) {
      .menu-item:hover {
        transform: none;
        box-shadow: none;
      }
    }

    .menu-item-line {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
    }

    .item-name {
      font-weight: 700;
      color: var(--text);
      min-width: 0;
      flex: 0 1 auto;
    }

    .dots {
      flex: 1;
      border-bottom: 1px dotted rgba(42, 18, 24, 0.35);
      transform: translateY(-2px);
      min-width: 12px;
    }

    .price {
      font-weight: 700;
      color: var(--primary);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .item-desc {
      margin-top: 0.28rem;
      color: var(--muted);
      font-size: 0.9rem;
      font-style: italic;
    }

    footer {
      margin-top: 2rem;
      background: #fff;
      border-top: 1px solid rgba(92, 31, 46, 0.12);
      padding: 1.4rem 0 1.8rem;
    }

    .footer-grid {
      display: grid;
      gap: 0.8rem;
      grid-template-columns: 1fr;
      align-items: start;
    }

    @media (min-width: 760px) {
      .footer-grid { grid-template-columns: 2fr 1fr; }
    }

    .footer-title {
      margin: 0;
      font-family: "Playfair Display", serif;
      font-size: 1.2rem;
    }

    .footer-meta {
      margin: 0.25rem 0 0;
      color: #51333b;
      font-size: 0.95rem;
    }

    .socials {
      display: flex;
      gap: 0.6rem;
      justify-content: flex-start;
      align-items: center;
    }

    .social-link {
      width: 36px;
      height: 36px;
      border-radius: 999px;
      border: 1px solid rgba(92, 31, 46, 0.2);
      display: inline-grid;
      place-items: center;
      color: var(--primary);
      text-decoration: none;
    }

    .disclaimer {
      margin-top: 0.8rem;
      color: #775860;
      font-size: 0.84rem;
    }

    @media print {
      .sticky-nav,
      .socials {
        display: none !important;
      }

      body {
        background: #fff;
        color: #000;
      }

      .hero {
        background: #fff !important;
        color: #000 !important;
        padding: 0 0 0.8rem !important;
        border-bottom: 1px solid #ddd;
      }

      .hero p,
      .hero-logo { display: none; }

      section.menu-section {
        box-shadow: none;
        border: 1px solid #ddd;
        break-inside: avoid;
      }

      .price {
        color: #000;
      }
    }
  </style>
</head>

    const categoryOrder = [
      "RAKILAR",
      "BIRALAR",
      "BEYAZ ŞARAPLAR",
      "KIRMIZI ŞARAPLAR",
      "ROSE & BLUSH",
      "VISKILER",
      "SAMPANYA",
      "VOTKA",
      "CIN",
      "TEKILA",
      "LIKOR",
      "KOKTEYL"
    ];

    const iconByCategory = {
      "RAKILAR": "glass-water",
      "BIRALAR": "beer",
      "BEYAZ ŞARAPLAR": "wine",
      "KIRMIZI ŞARAPLAR": "wine",
      "ROSE & BLUSH": "glass-water",
      "VISKILER": "flask-conical",
      "SAMPANYA": "sparkles",
      "VOTKA": "glass-water",
      "CIN": "martini",
      "TEKILA": "citrus",
      "LIKOR": "cup-soda",
      "KOKTEYL": "martini"
    };

    const i18n = {
      tr: {
        heroTitle: "İçecek Menüsü",
        heroSubtitle: "Butcha Steakhouse - Seçkin alkollü içecek koleksiyonu",
        phone: "Telefon: +90 (5__) ___ __ __",
        address: "Adres: [Adres Bilgisi Placeholder], Türkiye",
        warning: "21 yaş altına alkollü içecek satışı yasaktır.",
        social: "Sosyal Medya"
      },
      en: {
        heroTitle: "Drinks Menu",
        heroSubtitle: "Butcha Steakhouse - Curated alcoholic beverage collection",
        phone: "Phone: +90 (5__) ___ __ __",
        address: "Address: [Address Placeholder], Türkiye",
        warning: "Sale of alcoholic beverages to persons under 21 is prohibited.",
        social: "Social Media"
      }
    };

    const categoryNameMap = {
      "RAKILAR": "RAKIS",
      "BIRALAR": "BEERS",
      "BEYAZ ŞARAPLAR": "WHITE WINES",
      "KIRMIZI ŞARAPLAR": "RED WINES",
      "ROSE & BLUSH": "ROSE & BLUSH",
      "VISKILER": "WHISKIES",
      "SAMPANYA": "CHAMPAGNE",
      "VOTKA": "VODKA",
      "CIN": "GIN",
      "TEKILA": "TEQUILA",
      "LIKOR": "LIQUEUR",
      "KOKTEYL": "COCKTAIL"
    };

    let currentLang = "tr";

    function translateItemName(name) {
      if (currentLang === "tr") return name;

      const notes = [];
      if (/\bTEK\b/.test(name)) notes.push("Single Serve");
      if (/\bDUBLE\b/.test(name)) notes.push("Double Serve");
      if (/\bKADEH\b|\bKADE\b/.test(name)) notes.push("By the Glass");
      if (/\bSHOT\b/.test(name)) notes.push("Shot Serve");
      if (/\bOZEL SERI\b/.test(name)) notes.push("Special Series");
      if (/\bYENI SERI\b/.test(name)) notes.push("New Series");
      if (/\bREZERV\b/.test(name)) notes.push("Reserve");

      return notes.length ? `${name} (${notes.join(" • ")})` : name;
    }

    function displayCategoryName(name) {
      return currentLang === "en" ? (categoryNameMap[name] || name) : name;
    }

    function applyStaticI18n() {
      document.documentElement.lang = currentLang;
      document.querySelectorAll("[data-i18n]").forEach((el) => {
        const key = el.getAttribute("data-i18n");
        if (i18n[currentLang][key]) el.textContent = i18n[currentLang][key];
      });
      document.title = currentLang === "en"
        ? "Butcha Steakhouse | Drinks Menu"
        : "Butcha Steakhouse | İçecek Menüsü";
    }

    const lines = rawMenu
      .split("\n")
      .map((line) => line.trim())
      .filter(Boolean);

    const menuData = [];
    let current = null;

    for (let i = 0; i < lines.length; i += 1) {
      const line = lines[i];
      if (categoryOrder.includes(line)) {
        current = { title: line, items: [] };
        menuData.push(current);
        continue;
      }
      if (!current) continue;
      if (line.startsWith("₺")) continue;
      const maybePrice = lines[i + 1];
      if (maybePrice && maybePrice.startsWith("₺")) {
        current.items.push({ name: line, price: maybePrice });
        i += 1;
      }
    }

    const nav = document.getElementById("categoryNav");
    const root = document.getElementById("menuRoot");
    const langTr = document.getElementById("langTr");
    const langEn = document.getElementById("langEn");

    function renderMenu() {
      nav.innerHTML = "";
      root.innerHTML = "";

      menuData.forEach((category) => {
      const id = "cat-" + category.title.toLowerCase()
        .replace(/&/g, "and")
        .replace(/[^a-z0-9ğüşöçıİŞĞÜÖÇ]+/gi, "-")
        .replace(/-+/g, "-")
        .replace(/^-|-$/g, "");
      const shownTitle = displayCategoryName(category.title);

      const navLi = document.createElement("li");
      const iconName = iconByCategory[category.title] || "wine";
      navLi.innerHTML = `
        <a href="#${id}" aria-label="${shownTitle} bölümüne git">
          <span class="i" aria-hidden="true">${icon(iconName)}</span>
          <span>${shownTitle}</span>
        </a>`;
      nav.appendChild(navLi);

      const section = document.createElement("section");
      section.className = "menu-section";
      section.id = id;
      section.innerHTML = `
        <div class="section-title-wrap">
          <div class="gold-line"></div>
          <h2 class="section-title">
            <span class="i" aria-hidden="true">${icon(iconName)}</span>
            ${shownTitle}
          </h2>
          <div class="gold-line"></div>
        </div>
        <div class="items-grid" role="list" aria-label="${shownTitle} ürünleri">
          ${category.items.map((item) => `
            <article class="menu-item" role="listitem" aria-label="${translateItemName(item.name)} ${item.price}">
              <div class="menu-item-line">
                <span class="item-name">${translateItemName(item.name)}</span>
                <span class="dots" aria-hidden="true"></span>
                <span class="price">${item.price}</span>
              </div>
            </article>`).join("")}
        </div>`;
      root.appendChild(section);
      });

    }

    function setLang(lang) {
      currentLang = lang;
      langTr.classList.toggle("active", lang === "tr");
      langTr.setAttribute("aria-pressed", String(lang === "tr"));
      langEn.classList.toggle("active", lang === "en");
      langEn.setAttribute("aria-pressed", String(lang === "en"));
      applyStaticI18n();
      renderMenu();
    }

    langTr.addEventListener("click", () => setLang("tr"));
    langEn.addEventListener("click", () => setLang("en"));

    setLang("tr");
  </script>
